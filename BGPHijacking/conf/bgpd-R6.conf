! -*- bgp -*-
hostname bgpd-R6
password en
enable password en

router bgp 6
  no bgp ebgp-requires-policy
  no bgp network import-check

  bgp router-id 1.0.0.1
  network 11.0.0.0/8

  neighbor 9.0.6.1 remote-as 5
  neighbor 9.0.6.1 timers 5 5

log file /tmp/R6-bgpd.log

debug bgp as4
debug bgp keepalives
debug bgp updates

log stdout
